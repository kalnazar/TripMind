spring.application.name=TripMind

# Server error details
server.error.include-message=always
server.error.include-binding-errors=always

# DB connection (replace with your own DB host/user/pass)
spring.datasource.url=jdbc:postgresql://localhost:5432/tripmind
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Auth (set your own secure values)
app.jwt-secret=bW9udGhjb252ZXJzYXRpb25iZWhpbmRjbGVhbnRoZXlzdWRkZW5seXBvaW50cmljaHA=
app.jwt-exp-ms=604800000

# AI (Groq API key)
grok.api.key=REPLACE_WITH_YOUR_GROQ_KEY

# Localhost port
app.site-url=http://localhost:8080

# temporary
logging.level.org.springframework.security=DEBUG


